<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>自动回复机器人-忆痕</title>
    <link rel="stylesheet" type="text/css" href="static/iconfont.css">
    <link rel="stylesheet" href="static/chat.css">
    <script src="static/jquery-3.4.1.min.js"></script>
</head>
<body>


<div class="chatContainer" style="z-index: 100;">
    <div class="chatBtn">
        <i class="iconfont icon-xiaoxi1"></i>
    </div>
    <div class="chat-message-num"></div>
    <div class="chatBox" ref="chatBox" style="display: none">
        <div class="chatBox-head">
            <div class="chatBox-head-one">
                自动回复机器人-忆痕
                <div class="chat-close" style="margin: 10px 10px 0 0;font-size: 14px">关闭</div>
            </div>
            <div class="chatBox-head-two">
                <div class="chat-return">返回</div>
                <div class="chat-people">
                    <div class="ChatInfoHead">
                        <img src="static/icon01.png" alt="头像"/>
                    </div>
                    <div class="ChatInfoName">自动回复机器人-忆痕</div>
                </div>
                <div class="chat-close">关闭</div>
            </div>
        </div>
        <div class="chatBox-info">
            <div class="chatBox-list" ref="chatBoxlist">
                <div class="chat-list-people">
                    <div><img src="static/icon01.png" alt="头像"/></div>
                    <div class="chat-name">
                        <p>自动回复机器人-忆痕</p>
                    </div>
                    <div class="message-num">咨询</div>
                </div>
            </div>
            <div class="chatBox-kuang" ref="chatBoxkuang">
                <div class="chatBox-content">
                    <div class="chatBox-content-demo" id="chatBox-content-demo">

                        <div class="clearfloat">
                            <div class="author-name">
                                <small class="chat-date" id="systime">2019-5-24 19:24:35</small>
                            </div>
                            <div class="left">
                                <div class="chat-avatars"><img src="static/icon01.png" alt="头像"/></div>
                                <div class="chat-message">
                                    你好！我是自动回复机器人-忆痕，请问有什么可以帮到您？回复任意文字获取帮助信息！
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="chatBox-send">
                    <div class="div-textarea"></div>
                    <div>
                        <button id="chat-fasong" class="btn-default-styles"><i class="iconfont icon-fasong"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function timenow() {
        var myDate = new Date();
        var times = myDate.toLocaleString( );
        return times
    }

    document.getElementById('systime').innerHTML = timenow();
    screenFuc();
    function screenFuc() {
        var topHeight = $(".chatBox-head").innerHeight();//聊天头部高度
        //屏幕小于768px时候,布局change
        var winWidth = $(window).innerWidth();
        if (winWidth <= 768) {
            var totalHeight = $(window).height(); //页面整体高度
            $(".chatBox-info").css("height", totalHeight - topHeight);
            var infoHeight = $(".chatBox-info").innerHeight();//聊天头部以下高度
            //中间内容高度
            $(".chatBox-content").css("height", infoHeight - 46);
            $(".chatBox-content-demo").css("height", infoHeight - 46);

            $(".chatBox-list").css("height", totalHeight - topHeight);
            $(".chatBox-kuang").css("height", totalHeight - topHeight);
            $(".div-textarea").css("width", winWidth - 106);
        } else {
            $(".chatBox-info").css("height", 495);
            $(".chatBox-content").css("height", 448);
            $(".chatBox-content-demo").css("height", 448);
            $(".chatBox-list").css("height", 495);
            $(".chatBox-kuang").css("height", 495);
            $(".div-textarea").css("width", 260);
        }
    }
    (window.onresize = function () {
        screenFuc();
    })();
    //未读信息数量为空时
    var totalNum = $(".chat-message-num").html();
    if (totalNum == "") {
        $(".chat-message-num").css("padding", 0);
    }
    $(".message-num").each(function () {
        var wdNum = $(this).html();
        if (wdNum == "") {
            $(this).css("padding", 0);
        }
    });


    //打开/关闭聊天框
    $(".chatBtn").click(function () {
        $(".chatBox").toggle(10);
    })
    $(".chat-close").click(function () {
        $(".chatBox").toggle(10);
    })
    //进聊天页面
    $(".chat-list-people").each(function () {
        $(this).click(function () {
            $(".chatBox-head-one").toggle();
            $(".chatBox-head-two").toggle();
            $(".chatBox-list").fadeToggle();
            $(".chatBox-kuang").fadeToggle();

            //聊天框默认最底部
            $(document).ready(function () {
                $("#chatBox-content-demo").scrollTop($("#chatBox-content-demo")[0].scrollHeight);
            });
        })
    });

    //返回列表
    $(".chat-return").click(function () {
        $(".chatBox-head-one").toggle(1);
        $(".chatBox-head-two").toggle(1);
        $(".chatBox-list").fadeToggle(1);
        $(".chatBox-kuang").fadeToggle(1);
    });

    //      发送信息
    $("#chat-fasong").click(function () {
        var textContent = $(".div-textarea").html().replace(/[\n\r]/g, '<br>')
        if (textContent != "") {
            $(".chatBox-content-demo").append("<div class=\"clearfloat\">" +
                "<div class=\"author-name\"><small class=\"chat-date\" id=\"timenow\"></small> </div> " +
                "<div class=\"right\"> <div class=\"chat-message\"> " + textContent + " </div> " +
                "<div class=\"chat-avatars\"><img src=\"static/icon02.png\" alt=\"头像\" /></div> </div> </div>");
            //发送后清空输入框
            $(".div-textarea").html("");
            //聊天框默认最底部
            $(document).ready(function () {
                $("#chatBox-content-demo").scrollTop($("#chatBox-content-demo")[0].scrollHeight);
            });
            document.getElementById('timenow').innerHTML = timenow();

            if(textContent.indexOf("忆痕发布页网址多少") != "-1"){
                var re = "忆痕发布页网址为：https://www.937788.xyz/";
                reply(re);
            }
            else if(textContent.indexOf("忆痕的Github仓库地址是什么？") != "-1"){
                var re = "忆痕的Github仓库地址为：https://github.com/a937750307";
                reply(re);
            }
            else if(textContent.indexOf("找不着忆痕了怎么办？") != "-1"){
                var re = "可以在哔哩哔哩里搜“忆痕丶忆却无痕”，网站是https://space.bilibili.com/7950744;";
                reply(re);
            }
            else if(textContent.indexOf("我想了解忆痕") != "-1"){
                var re = "忆痕的个人介绍地址：https://card.937788.xyz/";
                reply(re);
            }
            else{
                var re = "请输入正确的关键字（发文字不发序号）：<br> 1.忆痕发布页网址多少<br> 2.忆痕的Github仓库地址是什么？<br>3.找不着忆痕了怎么办？<br>4.我想了解忆痕";
                reply(re);
            }

        }
    });

    //自动回复
    function reply(textContent) {
        if (textContent != "") {
            $(".chatBox-content-demo").append("<div class=\"clearfloat\">" +
                "<div class=\"author-name\"><small class=\"chat-date\" id=\"timenow\"></small> </div> " +
                "<div class=\"left\"><div class=\"chat-avatars\"><img src=\"static/icon01.png\" alt=\"头像\" /></div>  " +
                "<div class=\"chat-message\"> " + textContent + " </div> </div> </div>");
            //发送后清空输入框
            //  $(".div-textarea").html("");
            //聊天框默认最底部
            $(document).ready(function () {
                $("#chatBox-content-demo").scrollTop($("#chatBox-content-demo")[0].scrollHeight);
            });
            document.getElementById('timenow').innerHTML = timenow();
        }
    }


</script>



</body>
</html>
